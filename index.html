<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Waning Light</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0a;
        color: #c0c0c0;
        font-family: monospace;
        overflow: hidden;
      }

      #app {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      #game-canvas {
        flex: 1;
      }

      #side-panels {
        width: 300px;
        border-left: 1px solid #333;
        display: flex;
        flex-direction: column;
      }

      #log-panel,
      #journal-panel {
        overflow-y: auto;
        padding: 8px;
        font-size: 13px;
        line-height: 1.4;
        flex: 1;
      }

      .hidden {
        display: none;
      }

      #journal-tabs {
        display: flex;
        border-bottom: 1px solid #333;
        margin-bottom: 8px;
      }

      .journal-tab {
        background: none;
        border: none;
        color: #666;
        padding: 4px 8px;
        cursor: pointer;
        font-family: monospace;
      }

      .journal-tab.active {
        color: #c0c0c0;
        border-bottom: 1px solid #c0c0c0;
      }

      .log-entry {
        margin-bottom: 4px;
      }

      .log-turn {
        color: #666;
      }

      .log-narrative {
        color: #c0c0c0;
      }

      .log-resource {
        color: #4a9;
        font-weight: bold;
      }

      .log-searing {
        color: #d44;
        font-weight: bold;
      }

      .log-system {
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="side-panels">
        <div id="log-panel"></div>
        <div id="journal-panel" class="hidden">
          <div id="journal-tabs">
            <button class="journal-tab active" data-tab="rumors">Rumors</button>
            <button class="journal-tab" data-tab="relics">Relics</button>
          </div>
          <div id="journal-content"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
