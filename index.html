<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Waning Light</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0a;
        color: #c0c0c0;
        font-family: monospace;
        overflow: hidden;
      }

      #app {
        display: flex;
        width: 100vw;
        height: 100vh;
      }

      #game-canvas {
        flex: 1;
      }

      #log-panel {
        width: 300px;
        overflow-y: auto;
        padding: 8px;
        border-left: 1px solid #333;
        font-size: 13px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>
      <div id="log-panel"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
